<!DOCTYPE html>
<html>
<head>
    <title>PinFlow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>📌 PinFlow</h1>

    <!-- INPUT -->
    <form method="POST">
        <input name="link" placeholder="Paste Product Link" required>
        <button name="action" value="fetch">Fetch Images</button>
    </form>

    <!-- IMAGES -->
    <div class="images">
        {% for img in images %}
        <form method="POST">
            <input type="hidden" name="link" value="{{ request.form.get('link') }}">
            <input type="hidden" name="selected_image" value="{{ img }}">
            <img src="{{ img }}" class="img">
            <button name="action" value="generate">Use</button>
        </form>
        {% endfor %}
    </div>

    <!-- RESULT -->
    {% if data %}
    <div class="card">
        <img src="{{ data.image }}">

        <div class="content">
            <h2>{{ data.title }}</h2>
            <p>{{ data.description }}</p>
            <p class="tags">{{ data.tags }}</p>

            <a href="{{ data.link }}" target="_blank">🔗 View Product</a>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
